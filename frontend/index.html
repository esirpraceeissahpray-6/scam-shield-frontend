<!DOCTYPE html>
<html>
<head>
<title>Scam Shield Awareness</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2>🛡️ Scam Shield</h2>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('checker')">Checker</button>
<button onclick="showPage('report')">Report</button>
</nav>

<div id="home">

<h1>Scam Awareness Center</h1>
<p>Learn how to detect scams and stay safe online.</p>

<ul>
<li>Fake bank alerts</li>
<li>Job scams</li>
<li>OTP phishing</li>
<li>Investment fraud</li>
</ul>

</div>

<div id="checker" style="display:none">

<h1>Scam Checker</h1>

<textarea id="message" placeholder="Paste message here"></textarea>

<button onclick="checkMessage()">Analyze</button>

<h2 id="result"></h2>

</div>

<div id="report" style="display:none">

<h1>Report Scam</h1>

<input id="type" placeholder="Scam Type">

<textarea id="reportMessage" placeholder="Describe scam"></textarea>

<button onclick="submitReport()">Submit</button>

</div>

<script src="script.js"></script>

</body>
</html>
